<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>V-STOCK GLOBAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .tabular-nums { font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = window.Recharts;

        const PROXY_BASE = "https://api.allorigins.win/raw?url=";

        const formatMoney = (v, market) => {
            const locale = market === 'US' ? 'en-US' : 'ko-KR';
            const currency = market === 'US' ? 'USD' : 'KRW';
            return new Intl.NumberFormat(locale, { 
                style: 'currency', 
                currency,
                maximumFractionDigits: market === 'US' ? 2 : 0 
            }).format(v || 0);
        };

        const formatPercent = (v) => `${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;

        const App = () => {
            const [stocks, setStocks] = useState(() => JSON.parse(localStorage.getItem('vstock_list_v2')) || [
                { id: '005930.KS', name: '삼성전자', market: 'KR' },
                { id: 'TSLA', name: '테슬라', market: 'US' },
                { id: 'NVDA', name: '엔비디아', market: 'US' }
            ]);

            const [balance, setBalance] = useState(() => JSON.parse(localStorage.getItem('vstock_balance_v2')) || 100000000);
            const [portfolio, setPortfolio] = useState(() => JSON.parse(localStorage.getItem('vstock_portfolio_v2')) || []);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('vstock_history_v2')) || []);
            
            const [selectedSymbol, setSelectedSymbol] = useState(stocks[0].id);
            const [tradeQuantity, setTradeQuantity] = useState(1);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [prices, setPrices] = useState({});
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);

            useEffect(() => {
                localStorage.setItem('vstock_list_v2', JSON.stringify(stocks));
                localStorage.setItem('vstock_balance_v2', JSON.stringify(balance));
                localStorage.setItem('vstock_portfolio_v2', JSON.stringify(portfolio));
                localStorage.setItem('vstock_history_v2', JSON.stringify(history));
            }, [stocks, balance, portfolio, history]);

            const fetchPrices = async () => {
                try {
                    const results = await Promise.all(stocks.map(async (s) => {
                        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${s.id}?interval=1m&range=1d`;
                        const res = await fetch(PROXY_BASE + encodeURIComponent(url));
                        if (!res.ok) return null;
                        const data = await res.json();
                        return { id: s.id, price: data.chart.result[0].meta.regularMarketPrice };
                    }));
                    setPrices(prev => {
                        const next = { ...prev };
                        results.forEach(r => {
                            if (!r) return;
                            let hist = next[r.id] || Array.from({length: 20}, () => ({time:'', price: r.price}));
                            next[r.id] = [...hist.slice(1), { time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), price: r.price }];
                        });
                        return next;
                    });
                } catch (e) {}
            };

            useEffect(() => {
                fetchPrices();
                const timer = setInterval(fetchPrices, 30000);
                return () => clearInterval(timer);
            }, [stocks]);

            useEffect(() => {
                if (searchQuery.length < 2) { setSearchResults([]); return; }
                const timer = setTimeout(async () => {
                    try {
                        const url = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(searchQuery)}&quotesCount=5`;
                        const res = await fetch(PROXY_BASE + encodeURIComponent(url));
                        const data = await res.json();
                        setSearchResults(data.quotes.map(q => ({
                            id: q.symbol, name: q.shortname || q.symbol, 
                            market: q.symbol.includes('.') ? 'KR' : 'US'
                        })));
                    } catch (e) { setSearchResults([]); }
                }, 500);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            const handleTrade = (type) => {
                const currentPrice = prices[selectedSymbol]?.[prices[selectedSymbol].length-1]?.price || 0;
                if (currentPrice <= 0) return alert('가격을 불러오는 중입니다.');

                const totalCost = currentPrice * tradeQuantity;
                if (type === 'BUY') {
                    if (balance < totalCost) return alert('잔액이 부족합니다.');
                    setBalance(prev => prev - totalCost);
                    setPortfolio(prev => {
                        const existing = prev.find(p => p.symbol === selectedSymbol);
                        if (existing) {
                            return prev.map(p => p.symbol === selectedSymbol 
                                ? { ...p, quantity: p.quantity + tradeQuantity, avgPrice: (p.avgPrice * p.quantity + totalCost) / (p.quantity + tradeQuantity) }
                                : p);
                        }
                        return [...prev, { symbol: selectedSymbol, quantity: tradeQuantity, avgPrice: currentPrice }];
                    });
                } else {
                    const pos = portfolio.find(p => p.symbol === selectedSymbol);
                    if (!pos || pos.quantity < tradeQuantity) return alert('보유 수량이 부족합니다.');
                    setBalance(prev => prev + totalCost);
                    setPortfolio(prev => prev.map(p => p.symbol === selectedSymbol 
                        ? { ...p, quantity: p.quantity - tradeQuantity } : p).filter(p => p.quantity > 0));
                }

                setHistory(prev => [{
                    id: Date.now(),
                    symbol: selectedSymbol,
                    type,
                    quantity: tradeQuantity,
                    price: currentPrice,
                    timestamp: new Date().toISOString()
                }, ...prev]);
            };

            const currentPrice = prices[selectedSymbol]?.[prices[selectedSymbol].length-1]?.price || 0;
            const selectedStockInfo = stocks.find(s => s.id === selectedSymbol);
            const userPos = portfolio.find(p => p.symbol === selectedSymbol);
            const totalAssets = balance + portfolio.reduce((s,i)=>s+(i.quantity*(prices[i.symbol]?.[prices[i.symbol].length-1]?.price||0)),0);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-sm relative pb-24">
                    <header className="px-5 py-4 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-sm z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                                <i className="fa-solid fa-leaf text-white text-xs"></i>
                            </div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter uppercase">V-STOCK GLOBAL</h1>
                        </div>
                        <button onClick={() => location.reload()} className="text-slate-300 hover:text-emerald-500 transition-colors">
                            <i className="fa-solid fa-rotate-right text-xs"></i>
                        </button>
                    </header>

                    <main className="p-5 animate-fade-in">
                        {/* Summary Card */}
                        <div className="mb-8">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Balance</p>
                            <h2 className="text-2xl font-black tabular-nums text-slate-800 mb-4">{formatMoney(totalAssets, 'KR')}</h2>
                            <div className="flex gap-6">
                                <div>
                                    <p className="text-[10px] text-slate-400 font-medium mb-0.5">가용 현금</p>
                                    <p className="text-xs font-bold tabular-nums text-emerald-600">{formatMoney(balance, 'KR')}</p>
                                </div>
                                <div>
                                    <p className="text-[10px] text-slate-400 font-medium mb-0.5">보유 종목</p>
                                    <p className="text-xs font-bold tabular-nums text-slate-800">{portfolio.length} Items</p>
                                </div>
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center border-b border-slate-50 pb-2">
                                    <h3 className="text-xs font-bold text-slate-800 uppercase">My Portfolio</h3>
                                </div>
                                {portfolio.length === 0 ? (
                                    <div className="py-12 text-center bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                        <p className="text-xs text-slate-400 font-medium">지미, 아직 보유한 주식이 없어!</p>
                                    </div>
                                ) : (
                                    <ul className="divide-y divide-slate-50">
                                        {portfolio.map(p => {
                                            const cp = prices[p.symbol]?.[prices[p.symbol].length-1]?.price || p.avgPrice;
                                            const gain = (cp - p.avgPrice) / p.avgPrice * 100;
                                            return (
                                                <li key={p.symbol} onClick={() => {setSelectedSymbol(p.symbol); setActiveTab('trade');}} className="py-4 flex justify-between items-center active:opacity-60 transition-opacity cursor-pointer">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-2 h-2 rounded-full ${p.symbol.includes('.KS') ? 'bg-blue-400' : 'bg-emerald-400'}`}></div>
                                                        <div>
                                                            <p className="text-xs font-bold text-slate-800">{stocks.find(s=>s.id===p.symbol)?.name}</p>
                                                            <p className="text-[10px] text-slate-400 font-medium">{p.quantity} Shares</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-xs font-bold tabular-nums text-slate-800">{formatMoney(cp, p.symbol.includes('.') ? 'KR':'US')}</p>
                                                        <p className={`text-[10px] font-bold tabular-nums ${gain >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{formatPercent(gain)}</p>
                                                    </div>
                                                </li>
                                            );
                                        })}
                                    </ul>
                                )}
                            </div>
                        )}

                        {activeTab === 'trade' && (
                            <div className="space-y-6">
                                <div className="relative">
                                    <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-300 text-[10px]"></i>
                                    <input 
                                        type="text" 
                                        placeholder="검색 (예: 테슬라, NVDA)" 
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        className="w-full bg-slate-50 border-none rounded-xl pl-10 pr-4 py-3 text-xs font-bold focus:ring-1 focus:ring-emerald-500 outline-none transition-all"
                                    />
                                    {searchResults.length > 0 && (
                                        <div className="absolute top-12 left-0 right-0 bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden">
                                            {searchResults.map(s => (
                                                <div key={s.id} onClick={() => { 
                                                    if(!stocks.find(i=>i.id===s.id)) setStocks([...stocks, s]);
                                                    setSelectedSymbol(s.id); 
                                                    setSearchQuery(''); 
                                                }} className="px-4 py-3 hover:bg-emerald-50 cursor-pointer flex justify-between items-center border-b border-slate-50 last:border-none">
                                                    <span className="text-xs font-bold">{s.name} <span className="text-[9px] text-slate-400 ml-1">{s.id}</span></span>
                                                    <i className="fa-solid fa-plus text-emerald-400 text-[10px]"></i>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                    {stocks.map(s => (
                                        <button 
                                            key={s.id} 
                                            onClick={() => setSelectedSymbol(s.id)}
                                            className={`px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all flex-shrink-0 ${selectedSymbol === s.id ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-400'}`}
                                        >
                                            {s.name}
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-white border border-slate-100 rounded-2xl p-5">
                                    <div className="flex justify-between items-end mb-4">
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">{selectedSymbol}</p>
                                            <h3 className="text-lg font-black text-slate-800 tabular-nums">{formatMoney(currentPrice, selectedStockInfo?.market)}</h3>
                                        </div>
                                        <span className="text-[9px] font-black text-emerald-500 bg-emerald-50 px-1.5 py-0.5 rounded">LIVE</span>
                                    </div>
                                    <div className="h-40 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={prices[selectedSymbol]}>
                                                <defs>
                                                    <linearGradient id="colorG" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#10b981" stopOpacity={0.1}/>
                                                        <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#f8fafc" vertical={false} />
                                                <XAxis dataKey="time" hide />
                                                <YAxis hide domain={['auto', 'auto']} />
                                                {userPos && <ReferenceLine y={userPos.avgPrice} stroke="#fbbf24" strokeDasharray="3 3" />}
                                                <Area type="monotone" dataKey="price" stroke="#10b981" strokeWidth={1.5} fill="url(#colorG)" isAnimationActive={false} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <div className="bg-slate-50 rounded-xl p-4 flex items-center justify-between">
                                        <button onClick={()=>setTradeQuantity(q=>Math.max(1,q-1))} className="w-8 h-8 bg-white rounded-lg shadow-sm text-slate-400 text-xs">-</button>
                                        <div className="text-center">
                                            <input type="number" value={tradeQuantity} onChange={e=>setTradeQuantity(parseInt(e.target.value)||1)} className="bg-transparent text-sm font-black text-slate-800 outline-none w-12 text-center tabular-nums" />
                                            <p className="text-[8px] font-bold text-slate-300 uppercase">Quantity</p>
                                        </div>
                                        <button onClick={()=>setTradeQuantity(q=>q+1)} className="w-8 h-8 bg-white rounded-lg shadow-sm text-slate-400 text-xs">+</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={()=>handleTrade('BUY')} className="py-3 rounded-xl bg-emerald-500 text-white font-bold text-xs active:scale-95 transition-all">Buy</button>
                                        <button onClick={()=>handleTrade('SELL')} className="py-3 rounded-xl bg-slate-800 text-white font-bold text-xs active:scale-95 transition-all">Sell</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4">
                                <h3 className="text-xs font-bold text-slate-800 uppercase border-b border-slate-50 pb-2">History</h3>
                                {history.length === 0 ? <p className="text-center py-12 text-slate-300 text-xs">No records found.</p> : (
                                    <ul className="divide-y divide-slate-50">
                                        {history.map(h => (
                                            <li key={h.id} className="py-3 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${h.type === 'BUY' ? 'bg-emerald-50 text-emerald-500':'bg-slate-50 text-slate-400'}`}>
                                                        {h.type === 'BUY' ? 'BUY' : 'SELL'}
                                                    </span>
                                                    <div>
                                                        <p className="text-xs font-bold text-slate-800">{stocks.find(s=>s.id===h.symbol)?.name}</p>
                                                        <p className="text-[9px] text-slate-300">{new Date(h.timestamp).toLocaleDateString()}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right font-bold tabular-nums">
                                                    <p className="text-xs text-slate-800">{h.quantity}주</p>
                                                    <p className="text-[9px] text-slate-400">{formatMoney(h.price, h.symbol.includes('.') ? 'KR':'US')}</p>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 max-w-md w-full bg-white/90 backdrop-blur-md border-t border-slate-50 px-8 py-4 flex justify-between items-center z-50">
                        <button onClick={()=>setActiveTab('dashboard')} className={`text-lg ${activeTab === 'dashboard' ? 'text-emerald-500':'text-slate-200'}`}>
                            <i className="fa-solid fa-house"></i>
                        </button>
                        <button onClick={()=>setActiveTab('trade')} className={`text-lg ${activeTab === 'trade' ? 'text-emerald-500':'text-slate-200'}`}>
                            <i className="fa-solid fa-chart-line"></i>
                        </button>
                        <button onClick={()=>setActiveTab('history')} className={`text-lg ${activeTab === 'history' ? 'text-emerald-500':'text-slate-200'}`}>
                            <i className="fa-solid fa-clock-rotate-left"></i>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
