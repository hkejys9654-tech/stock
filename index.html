<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>V-STOCK KR: 초고속 스마트 검색</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0F1115; color: #e2e8f0; margin: 0; padding: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .search-item:hover { background-color: rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        const formatKRW = (v) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(v || 0);
        const formatPercent = (v) => `${v > 0 ? '+' : ''}${(v || 0).toFixed(2)}%`;

        const DEFAULT_STOCKS = [
            { id: '005930.KS', name: '삼성전자', color: '#0058CB' },
            { id: '000660.KS', name: 'SK하이닉스', color: '#EA002C' },
            { id: '035720.KS', name: '카카오', color: '#FAE100' },
            { id: '005380.KS', name: '현대차', color: '#002C5F' }
        ];

        // 🚀 초고속 검색을 위한 로컬 종목 데이터베이스 (Top 60)
        const LOCAL_STOCK_DB = [
            {id: "005930.KS", name: "삼성전자", ex: "코스피"}, {id: "000660.KS", name: "SK하이닉스", ex: "코스피"},
            {id: "373220.KS", name: "LG에너지솔루션", ex: "코스피"}, {id: "207940.KS", name: "삼성바이오로직스", ex: "코스피"},
            {id: "005380.KS", name: "현대차", ex: "코스피"}, {id: "000270.KS", name: "기아", ex: "코스피"},
            {id: "068270.KS", name: "셀트리온", ex: "코스피"}, {id: "005490.KS", name: "POSCO홀딩스", ex: "코스피"},
            {id: "035420.KS", name: "NAVER", ex: "코스피"}, {id: "035420.KS", name: "네이버", ex: "코스피"},
            {id: "051910.KS", name: "LG화학", ex: "코스피"}, {id: "000810.KS", name: "삼성화재", ex: "코스피"},
            {id: "035720.KS", name: "카카오", ex: "코스피"}, {id: "006400.KS", name: "삼성SDI", ex: "코스피"},
            {id: "105560.KS", name: "KB금융", ex: "코스피"}, {id: "055550.KS", name: "신한지주", ex: "코스피"},
            {id: "012330.KS", name: "현대모비스", ex: "코스피"}, {id: "032830.KS", name: "삼성생명", ex: "코스피"},
            {id: "086520.KQ", name: "에코프로", ex: "코스닥"}, {id: "247540.KQ", name: "에코프로비엠", ex: "코스닥"},
            {id: "086960.KQ", name: "HLB", ex: "코스닥"}, {id: "028300.KQ", name: "알테오젠", ex: "코스닥"},
            {id: "066970.KQ", name: "엘앤에프", ex: "코스닥"}, {id: "035900.KQ", name: "JYP Ent.", ex: "코스닥"},
            {id: "042700.KS", name: "한미반도체", ex: "코스피"}, {id: "003670.KS", name: "포스코퓨처엠", ex: "코스피"},
            {id: "011200.KS", name: "HMM", ex: "코스피"}, {id: "034020.KS", name: "두산에너빌리티", ex: "코스피"},
            {id: "010130.KS", name: "고려아연", ex: "코스피"}, {id: "022100.KS", name: "포스코인터내셔널", ex: "코스피"},
            {id: "015760.KS", name: "한국전력", ex: "코스피"}, {id: "034730.KS", name: "SK", ex: "코스피"},
            {id: "033780.KS", name: "KT&G", ex: "코스피"}, {id: "000100.KS", name: "유한양행", ex: "코스피"},
            {id: "018260.KS", name: "삼성SDS", ex: "코스피"}, {id: "090430.KS", name: "아모레퍼시픽", ex: "코스피"},
            {id: "010950.KS", name: "S-Oil", ex: "코스피"}, {id: "011170.KS", name: "롯데지주", ex: "코스피"},
            {id: "323410.KS", name: "카카오뱅크", ex: "코스피"}, {id: "316140.KS", name: "우리금융지주", ex: "코스피"},
            {id: "024110.KS", name: "기업은행", ex: "코스피"}, {id: "352820.KS", name: "하이브", ex: "코스피"},
            {id: "259960.KS", name: "크래프톤", ex: "코스피"}, {id: "017670.KS", name: "SK텔레콤", ex: "코스피"},
            {id: "030200.KS", name: "KT", ex: "코스피"}, {id: "032640.KS", name: "LG유플러스", ex: "코스피"},
            {id: "036570.KS", name: "엔씨소프트", ex: "코스피"}, {id: "251270.KS", name: "넷마블", ex: "코스피"},
            {id: "192820.KS", name: "코스맥스", ex: "코스피"}, {id: "271560.KS", name: "오리온", ex: "코스피"}
        ];

        const PROXY_BASE = "https://api.allorigins.win/raw?url=";

        const App = () => {
            const [stocks, setStocks] = useState(() => JSON.parse(localStorage.getItem('vstock_list')) || DEFAULT_STOCKS);
            const [balance, setBalance] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_balance')) || 100000000);
            const [portfolio, setPortfolio] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_portfolio')) || []);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_history')) || []);
            
            const [selectedSymbol, setSelectedSymbol] = useState(stocks[0]?.id || '');
            const [tradeQuantity, setTradeQuantity] = useState(1);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [prices, setPrices] = useState({});
            
            // 검색 관련 상태
            const [isAdding, setIsAdding] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            useEffect(() => {
                localStorage.setItem('vstock_list', JSON.stringify(stocks));
                localStorage.setItem('vstock_kr_balance', JSON.stringify(balance));
                localStorage.setItem('vstock_kr_portfolio', JSON.stringify(portfolio));
                localStorage.setItem('vstock_kr_history', JSON.stringify(history));
            }, [stocks, balance, portfolio, history]);

            // 실시간 주가 페칭
            const fetchPrices = async () => {
                try {
                    const results = await Promise.all(stocks.map(async (s) => {
                        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${s.id}?interval=1m&range=1d`;
                        const res = await fetch(PROXY_BASE + encodeURIComponent(url));
                        if (!res.ok) return null;
                        const data = await res.json();
                        return { id: s.id, price: data.chart.result[0].meta.regularMarketPrice };
                    }));
                    setPrices(prev => {
                        const next = { ...prev };
                        results.forEach(r => {
                            if (!r) return;
                            let hist = next[r.id] || Array.from({length: 20}, () => ({time:'', price: r.price}));
                            next[r.id] = [...hist.slice(1), { time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}), price: r.price }];
                        });
                        return next;
                    });
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                fetchPrices();
                const timer = setInterval(fetchPrices, 10000);
                return () => clearInterval(timer);
            }, [stocks]);

            // 🚀 하이브리드 검색 기능 (로컬 즉시 검색 + API 검색)
            useEffect(() => {
                if (!searchQuery.trim()) {
                    setSearchResults([]);
                    setIsSearching(false);
                    return;
                }

                // 1단계: 로컬 DB에서 초고속 검색 (타자 치는 즉시 나옴)
                const localResults = LOCAL_STOCK_DB.filter(s => 
                    s.name.includes(searchQuery) || s.id.includes(searchQuery)
                );
                setSearchResults(localResults);

                // 2단계: 로컬에 없는 종목을 위한 야후 API 우회 검색 (0.8초 디바운스)
                const delayDebounceFn = setTimeout(async () => {
                    setIsSearching(true);
                    try {
                        const url = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(searchQuery)}&quotesCount=10`;
                        const res = await fetch(PROXY_BASE + encodeURIComponent(url));
                        if (res.ok) {
                            const data = await res.json();
                            const externalResults = data.quotes
                                .filter(q => q.symbol.endsWith('.KS') || q.symbol.endsWith('.KQ'))
                                .map(q => ({
                                    id: q.symbol,
                                    name: q.shortname || q.longname || q.symbol,
                                    ex: q.symbol.endsWith('.KS') ? '코스피' : '코스닥'
                                }));
                            
                            // 로컬 결과와 외부 결과를 중복 없이 합침
                            setSearchResults(prev => {
                                const merged = [...prev];
                                externalResults.forEach(ext => {
                                    if (!merged.find(p => p.id === ext.id)) {
                                        merged.push(ext);
                                    }
                                });
                                return merged;
                            });
                        }
                    } catch (e) { console.error("외부 검색 오류", e); }
                    setIsSearching(false);
                }, 800); 

                return () => clearTimeout(delayDebounceFn);
            }, [searchQuery]);

            const addStockFromSearch = (s) => {
                if (stocks.find(item => item.id === s.id)) return alert('이미 리스트에 추가되어 있습니다!');
                const colors = ['#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#00D1FF', '#FF4560'];
                const newStock = { id: s.id, name: s.name, color: colors[stocks.length % colors.length] };
                setStocks([...stocks, newStock]);
                setIsAdding(false);
                setSearchQuery('');
                setSelectedSymbol(s.id);
            };

            const deleteStock = (id) => {
                if (portfolio.find(p => p.symbol === id)) return alert('보유 중인 주식은 리스트에서 삭제할 수 없습니다.');
                setStocks(stocks.filter(s => s.id !== id));
            };

            const currentPricesMap = useMemo(() => {
                const map = {};
                Object.keys(prices).forEach(k => { map[k] = prices[k][prices[k].length-1].price; });
                return map;
            }, [prices]);

            const totalStockValue = portfolio.reduce((s, i) => s + (i.quantity * (currentPricesMap[i.symbol] || 0)), 0);
            const totalAssets = balance + totalStockValue;

            const handleTrade = (type) => {
                const price = currentPricesMap[selectedSymbol];
                if (!price) return alert('시세를 불러오는 중입니다. 잠시만 기다려주세요.');
                const cost = price * tradeQuantity;
                
                if (type === 'BUY') {
                    if (balance < cost) return alert('잔고 부족!');
                    setBalance(b => b - cost);
                    setPortfolio(p => {
                        const exist = p.find(i => i.symbol === selectedSymbol);
                        if (exist) return p.map(i => i.symbol === selectedSymbol ? {...i, quantity: i.quantity + tradeQuantity, avgPrice: ((i.avgPrice * i.quantity) + cost) / (i.quantity + tradeQuantity)} : i);
                        return [...p, { symbol: selectedSymbol, quantity: tradeQuantity, avgPrice: price }];
                    });
                } else {
                    const exist = portfolio.find(i => i.symbol === selectedSymbol);
                    if (!exist || exist.quantity < tradeQuantity) return alert('보유 수량이 부족합니다!');
                    setBalance(b => b + cost);
                    setPortfolio(p => {
                        const nq = exist.quantity - tradeQuantity;
                        return nq === 0 ? p.filter(i => i.symbol !== selectedSymbol) : p.map(i => i.symbol === selectedSymbol ? {...i, quantity: nq} : i);
                    });
                }
                setHistory(h => [{id: Math.random(), type, symbol: selectedSymbol, price, quantity: tradeQuantity, timestamp: Date.now()}, ...h]);
            };

            return (
                <div className="min-h-screen bg-[#0F1115] text-slate-200 font-sans pb-24">
                    <header className="sticky top-0 z-50 border-b border-white/5 bg-[#0F1115]/90 backdrop-blur-md px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                <i className="fa-solid fa-magnifying-glass-chart text-white text-sm"></i>
                            </div>
                            <h1 className="text-xl font-black">V-STOCK SMART</h1>
                        </div>
                        <button onClick={() => { if(confirm('모든 데이터를 리셋할까요?')) {localStorage.clear(); location.reload();} }} className="text-slate-500 hover:text-white"><i className="fa-solid fa-rotate-right"></i></button>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* Summary */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1 tracking-widest">TOTAL ASSETS</p>
                                <p className="text-2xl font-black text-white">{formatKRW(totalAssets)}</p>
                                <p className={`text-sm font-bold mt-1 ${totalAssets >= 100000000 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {formatPercent(((totalAssets - 100000000) / 100000000) * 100)}
                                </p>
                            </div>
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1 tracking-widest">AVAILABLE CASH</p>
                                <p className="text-2xl font-black text-white">{formatKRW(balance)}</p>
                            </div>
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1 tracking-widest">HOLDINGS</p>
                                <p className="text-2xl font-black text-white">{portfolio.length} 종목</p>
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="animate-fade-in space-y-6">
                                <h2 className="text-lg font-bold px-1">실시간 포트폴리오</h2>
                                <div className="bg-[#1A1D23] rounded-2xl border border-white/5 overflow-hidden">
                                    {portfolio.length === 0 ? <p className="p-20 text-center text-slate-600 font-bold">보유 중인 주식이 없습니다.</p> : (
                                        <table className="w-full text-left">
                                            <thead className="bg-white/5 text-[10px] text-slate-400 uppercase tracking-widest">
                                                <tr><th className="px-6 py-4">종목</th><th className="px-6 py-4">수량</th><th className="px-6 py-4">평단가</th><th className="px-6 py-4 text-right">수익률</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {portfolio.map(i => {
                                                    const cp = currentPricesMap[i.symbol] || i.avgPrice;
                                                    const prof = (cp - i.avgPrice) / i.avgPrice * 100;
                                                    return (
                                                        <tr key={i.symbol} className="hover:bg-white/5 cursor-pointer" onClick={() => {setSelectedSymbol(i.symbol); setActiveTab('trade');}}>
                                                            <td className="px-6 py-4 font-black text-white">{stocks.find(st => st.id === i.symbol)?.name || i.symbol}</td>
                                                            <td className="px-6 py-4 font-bold text-slate-300">{i.quantity}</td>
                                                            <td className="px-6 py-4 text-slate-400 font-bold">{formatKRW(i.avgPrice)}</td>
                                                            <td className={`px-6 py-4 text-right font-black ${prof >= 0 ? 'text-emerald-400':'text-rose-400'}`}>{formatPercent(prof)}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'trade' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-4">
                                    {/* 종목 리스트 탭 */}
                                    <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                                        <button onClick={() => {setIsAdding(!isAdding); setSearchQuery('');}} className="px-4 py-3 rounded-xl bg-blue-600 text-white font-black flex-shrink-0 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                                            <i className={`fa-solid ${isAdding ? 'fa-xmark' : 'fa-plus'} mr-2`}></i>종목 찾기
                                        </button>
                                        {stocks.map(s => (
                                            <div key={s.id} className="relative group flex-shrink-0">
                                                <button onClick={() => setSelectedSymbol(s.id)} className={`px-5 py-3 rounded-xl text-sm font-black transition-all ${selectedSymbol === s.id ? "bg-white text-black shadow-lg" : "bg-[#1A1D23] text-slate-400 border border-white/5 hover:text-white"}`}>
                                                    {s.name}
                                                </button>
                                                <button onClick={() => deleteStock(s.id)} className="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 text-white rounded-full text-[10px] hidden group-hover:flex items-center justify-center shadow-lg"><i className="fa-solid fa-x"></i></button>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 🚀 스마트 검색창 UI */}
                                    {isAdding && (
                                        <div className="bg-[#1E222A] border border-blue-500/50 p-4 rounded-2xl animate-fade-in relative z-10 shadow-2xl">
                                            <div className="relative">
                                                <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                                                <input 
                                                    type="text" 
                                                    autoFocus
                                                    placeholder="종목명 입력 (예: 삼성전자, 네이버, 카카오)" 
                                                    value={searchQuery} 
                                                    onChange={e=>setSearchQuery(e.target.value)} 
                                                    className="w-full bg-[#0F1115] border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm font-bold text-white outline-none focus:border-blue-500 transition-all" 
                                                />
                                                {isSearching && <div className="absolute right-4 top-3.5"><i className="fa-solid fa-circle-notch fa-spin text-blue-500"></i></div>}
                                            </div>
                                            
                                            {searchResults.length > 0 && (
                                                <div className="mt-3 bg-[#0F1115] rounded-xl border border-white/5 overflow-hidden max-h-60 overflow-y-auto shadow-inner">
                                                    {searchResults.map(s => (
                                                        <div key={s.id} onClick={() => addStockFromSearch(s)} className="search-item px-5 py-4 cursor-pointer border-b border-white/5 flex justify-between items-center transition-colors">
                                                            <div>
                                                                <p className="font-black text-white text-base">{s.name}</p>
                                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-1">{s.id} <span className="mx-1">·</span> {s.ex || s.exchange}</p>
                                                            </div>
                                                            <button className="bg-blue-600/20 text-blue-400 w-8 h-8 rounded-full flex items-center justify-center"><i className="fa-solid fa-plus"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            {searchQuery.length > 0 && !isSearching && searchResults.length === 0 && (
                                                <p className="text-sm font-bold text-slate-500 mt-4 mb-2 text-center">검색 결과가 없습니다.</p>
                                            )}
                                        </div>
                                    )}

                                    {/* 차트 영역 */}
                                    <div className="bg-[#1A1D23] rounded-2xl border border-white/5 p-6 shadow-2xl mt-4">
                                        <div className="flex items-end justify-between mb-8">
                                            <div>
                                                <h2 className="text-sm font-bold text-slate-400 mb-1">{stocks.find(s=>s.id===selectedSymbol)?.name}</h2>
                                                <h3 className="text-4xl font-black tracking-tighter flex items-baseline gap-2 text-white">
                                                    {formatKRW(currentPricesMap[selectedSymbol])}
                                                </h3>
                                            </div>
                                        </div>
                                        <div className="h-[320px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={prices[selectedSymbol]}>
                                                    <defs>
                                                        <linearGradient id="colorP" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor={stocks.find(s=>s.id===selectedSymbol)?.color} stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor={stocks.find(s=>s.id===selectedSymbol)?.color} stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="#ffffff05" vertical={false} />
                                                    <XAxis dataKey="time" hide />
                                                    <YAxis hide domain={['auto', 'auto']} />
                                                    <Tooltip contentStyle={{backgroundColor:'#1A1D23', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'12px', boxShadow:'0 10px 15px -3px rgba(0,0,0,0.5)'}} itemStyle={{fontWeight:'bold', color:'#fff'}} />
                                                    <Area type="monotone" dataKey="price" stroke={stocks.find(s=>s.id===selectedSymbol)?.color} strokeWidth={4} fill="url(#colorP)" isAnimationActive={false} />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                {/* 매수/매도 영역 */}
                                <div className="space-y-4">
                                    <div className="bg-[#1A1D23] rounded-2xl border border-white/5 p-6 space-y-6 shadow-xl">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 mb-4 block uppercase tracking-[0.2em]">Quantity Control</label>
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => setTradeQuantity(q => Math.max(1, q - 1))} className="w-14 h-14 rounded-2xl bg-white/5 hover:bg-white/10 flex items-center justify-center transition-all"><i className="fa-solid fa-minus"></i></button>
                                                <input type="number" value={tradeQuantity} onChange={e=>setTradeQuantity(Math.max(1, parseInt(e.target.value)||1))} className="flex-1 bg-white/5 rounded-2xl h-14 text-center text-2xl font-black text-white outline-none focus:bg-white/10 transition-all" />
                                                <button onClick={() => setTradeQuantity(q => q + 1)} className="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all"><i className="fa-solid fa-plus"></i></button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={()=>handleTrade('BUY')} className="h-16 rounded-[20px] bg-emerald-500 text-[#0F1115] font-black text-xl shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">매수</button>
                                            <button onClick={()=>handleTrade('SELL')} className="h-16 rounded-[20px] bg-rose-500 text-white font-black text-xl shadow-lg shadow-rose-500/20 active:scale-95 transition-all">매도</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="animate-fade-in space-y-4">
                                <h2 className="text-lg font-bold px-1">거래 히스토리</h2>
                                <div className="bg-[#1A1D23] rounded-2xl border border-white/5 overflow-hidden">
                                    {history.length === 0 ? <p className="p-20 text-center text-slate-600 font-bold">거래 내역이 없습니다.</p> : (
                                        <div className="divide-y divide-white/5">
                                            {history.map(tx => (
                                                <div key={tx.id} className="p-5 flex justify-between items-center hover:bg-white/5">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-[10px] ${tx.type === 'BUY' ? 'bg-emerald-500/10 text-emerald-400':'bg-rose-500/10 text-rose-400'}`}>
                                                            {tx.type === 'BUY' ? '매수' : '매도'}
                                                        </div>
                                                        <div>
                                                            <p className="font-black text-white">{stocks.find(s=>s.id===tx.symbol)?.name || tx.symbol}</p>
                                                            <p className="text-[10px] text-slate-500 font-bold mt-1">{new Date(tx.timestamp).toLocaleString()}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-black text-white">{tx.quantity} 주</p>
                                                        <p className="text-xs text-slate-400 font-bold mt-1">{formatKRW(tx.price)}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1A1D23]/95 backdrop-blur-xl border-t border-white/5 px-6 py-4 z-50">
                        <div className="max-w-md mx-auto flex justify-between">
                            <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center gap-1.5 w-1/3 transition-colors ${activeTab === 'dashboard' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-border-all text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">대시보드</span></button>
                            <button onClick={()=>setActiveTab('trade')} className={`flex flex-col items-center gap-1.5 w-1/3 transition-colors ${activeTab === 'trade' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-chart-simple text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">주식거래</span></button>
                            <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center gap-1.5 w-1/3 transition-colors ${activeTab === 'history' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-clock-rotate-left text-xl"></i><span className="text-[10px] font-black uppercase tracking-tighter">내역</span></button>
                        </div>
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
