<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>V-STOCK 한국주식 PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0F1115; color: #e2e8f0; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        const formatKRW = (v) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(v || 0);
        const formatPercent = (v) => `${v > 0 ? '+' : ''}${(v || 0).toFixed(2)}%`;

        // 기본 종목 리스트
        const DEFAULT_STOCKS = [
            { id: '005930.KS', name: '삼성전자', color: '#0058CB' },
            { id: '000660.KS', name: 'SK하이닉스', color: '#EA002C' },
            { id: '035720.KS', name: '카카오', color: '#FAE100' },
            { id: '005380.KS', name: '현대차', color: '#002C5F' }
        ];

        const App = () => {
            // 1. 종목 리스트 상태 (로컬 스토리지 연동)
            const [stocks, setStocks] = useState(() => {
                const saved = localStorage.getItem('vstock_list');
                return saved ? JSON.parse(saved) : DEFAULT_STOCKS;
            });

            const [balance, setBalance] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_balance')) || 100000000);
            const [portfolio, setPortfolio] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_portfolio')) || []);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('vstock_kr_history')) || []);
            
            const [selectedSymbol, setSelectedSymbol] = useState(stocks[0].id);
            const [tradeQuantity, setTradeQuantity] = useState(1);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [prices, setPrices] = useState({});
            const [isLoading, setIsLoading] = useState(true);

            // 종목 추가용 입력창 상태
            const [isAdding, setIsAdding] = useState(false);
            const [newStock, setNewStock] = useState({ name: '', id: '', market: '.KS' });

            useEffect(() => {
                localStorage.setItem('vstock_list', JSON.stringify(stocks));
                localStorage.setItem('vstock_kr_balance', JSON.stringify(balance));
                localStorage.setItem('vstock_kr_portfolio', JSON.stringify(portfolio));
                localStorage.setItem('vstock_kr_history', JSON.stringify(history));
            }, [stocks, balance, portfolio, history]);

            // 실시간 주가 페칭 (야후 파이낸스)
            const fetchPrices = async () => {
                try {
                    const promises = stocks.map(async (s) => {
                        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${s.id}?interval=1m&range=1d`;
                        const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                        if (!res.ok) return null;
                        const data = await res.json();
                        return { id: s.id, price: data.chart.result[0].meta.regularMarketPrice };
                    });
                    const results = await Promise.all(promises);
                    setPrices(prev => {
                        const next = { ...prev };
                        results.forEach(r => {
                            if (!r) return;
                            let hist = next[r.id] || Array.from({length: 20}, () => ({time:'', price: r.price}));
                            next[r.id] = [...hist.slice(1), { time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}), price: r.price }];
                        });
                        return next;
                    });
                    setIsLoading(false);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                fetchPrices();
                const timer = setInterval(fetchPrices, 10000);
                return () => clearInterval(timer);
            }, [stocks]);

            // 종목 추가 함수
            const addStock = () => {
                if (!newStock.name || !newStock.id) return alert('이름과 코드를 입력하세요!');
                const fullId = newStock.id.trim() + newStock.market;
                if (stocks.find(s => s.id === fullId)) return alert('이미 리스트에 있는 종목입니다.');
                
                const colorList = ['#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#6366F1'];
                const randomColor = colorList[Math.floor(Math.random() * colorList.length)];

                setStocks([...stocks, { id: fullId, name: newStock.name, color: randomColor }]);
                setNewStock({ name: '', id: '', market: '.KS' });
                setIsAdding(false);
                alert(`${newStock.name} 추가 완료! 시세를 불러옵니다.`);
            };

            // 종목 삭제 함수
            const deleteStock = (id) => {
                if (portfolio.find(p => p.symbol === id)) return alert('보유 중인 종목은 삭제할 수 없습니다.');
                if (confirm('이 종목을 리스트에서 삭제할까요?')) {
                    const filtered = stocks.filter(s => s.id !== id);
                    setStocks(filtered);
                    if (selectedSymbol === id) setSelectedSymbol(filtered[0]?.id || '');
                }
            };

            const currentPricesMap = useMemo(() => {
                const map = {};
                Object.keys(prices).forEach(k => { map[k] = prices[k][prices[k].length-1].price; });
                return map;
            }, [prices]);

            const totalStockValue = portfolio.reduce((s, i) => s + (i.quantity * (currentPricesMap[i.symbol] || 0)), 0);
            const totalAssets = balance + totalStockValue;

            const handleTrade = (type) => {
                const price = currentPricesMap[selectedSymbol];
                if (!price) return;
                const cost = price * tradeQuantity;
                if (type === 'BUY') {
                    if (balance < cost) return alert('잔고 부족!');
                    setBalance(b => b - cost);
                    setPortfolio(p => {
                        const exist = p.find(i => i.symbol === selectedSymbol);
                        if (exist) return p.map(i => i.symbol === selectedSymbol ? {...i, quantity: i.quantity + tradeQuantity, avgPrice: ((i.avgPrice * i.quantity) + cost) / (i.quantity + tradeQuantity)} : i);
                        return [...p, { symbol: selectedSymbol, quantity: tradeQuantity, avgPrice: price }];
                    });
                } else {
                    const exist = portfolio.find(i => i.symbol === selectedSymbol);
                    if (!exist || exist.quantity < tradeQuantity) return alert('수량 부족!');
                    setBalance(b => b + cost);
                    setPortfolio(p => {
                        const nq = exist.quantity - tradeQuantity;
                        return nq === 0 ? p.filter(i => i.symbol !== selectedSymbol) : p.map(i => i.symbol === selectedSymbol ? {...i, quantity: nq} : i);
                    });
                }
                setHistory(h => [{id: Math.random(), type, symbol: selectedSymbol, price, quantity: tradeQuantity, timestamp: Date.now()}, ...h]);
            };

            return (
                <div className="min-h-screen bg-[#0F1115] text-slate-200 font-sans pb-24">
                    <header className="sticky top-0 z-50 border-b border-white/5 bg-[#0F1115]/90 backdrop-blur-md px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/30">
                                <i className="fa-solid fa-won-sign text-white font-black"></i>
                            </div>
                            <h1 className="text-xl font-black">V-STOCK KR</h1>
                        </div>
                        <button onClick={() => { if(confirm('리셋할까요?')) {localStorage.clear(); location.reload();} }} className="text-slate-500 hover:text-white"><i className="fa-solid fa-rotate-right"></i></button>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* Summary */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1">총 자산</p>
                                <p className="text-2xl font-black text-white">{formatKRW(totalAssets)}</p>
                                <p className={`text-sm font-bold mt-1 ${totalAssets >= 100000000 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {formatPercent(((totalAssets - 100000000) / 100000000) * 100)}
                                </p>
                            </div>
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1">가용 현금</p>
                                <p className="text-2xl font-black text-white">{formatKRW(balance)}</p>
                            </div>
                            <div className="bg-[#1A1D23] p-5 rounded-2xl border border-white/5 shadow-xl">
                                <p className="text-xs font-bold text-slate-500 mb-1">보유 종목</p>
                                <p className="text-2xl font-black text-white">{portfolio.length} 종목</p>
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="animate-fade-in space-y-6">
                                <h2 className="text-lg font-bold px-1">포트폴리오 현황</h2>
                                <div className="bg-[#1A1D23] rounded-2xl border border-white/5 overflow-hidden overflow-x-auto">
                                    <table className="w-full text-left min-w-[500px]">
                                        <thead className="bg-white/5 text-xs text-slate-400 uppercase">
                                            <tr>
                                                <th className="px-6 py-4">종목</th>
                                                <th className="px-6 py-4">보유량</th>
                                                <th className="px-6 py-4">평단가</th>
                                                <th className="px-6 py-4 text-right">수익률</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {portfolio.map(i => {
                                                const cp = currentPricesMap[i.symbol] || i.avgPrice;
                                                const prof = (cp - i.avgPrice) / i.avgPrice * 100;
                                                const s = stocks.find(st => st.id === i.symbol);
                                                return (
                                                    <tr key={i.symbol} className="hover:bg-white/5 cursor-pointer" onClick={() => {setSelectedSymbol(i.symbol); setActiveTab('trade');}}>
                                                        <td className="px-6 py-4 font-black">{s?.name || i.symbol}</td>
                                                        <td className="px-6 py-4">{i.quantity} 주</td>
                                                        <td className="px-6 py-4 text-slate-400">{formatKRW(i.avgPrice)}</td>
                                                        <td className={`px-6 py-4 text-right font-black ${prof >= 0 ? 'text-emerald-400':'text-rose-400'}`}>{formatPercent(prof)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'trade' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-4">
                                    {/* 종목 리스트 & 추가 버튼 */}
                                    <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                                        <button onClick={() => setIsAdding(!isAdding)} className="px-4 py-3 rounded-xl bg-blue-600 text-white font-black flex-shrink-0 active:scale-95 transition-all">
                                            <i className={`fa-solid ${isAdding ? 'fa-xmark' : 'fa-plus'} mr-2`}></i>종목 추가
                                        </button>
                                        {stocks.map(s => (
                                            <div key={s.id} className="relative group">
                                                <button onClick={() => setSelectedSymbol(s.id)} className={`px-5 py-3 rounded-xl text-sm font-black transition-all ${selectedSymbol === s.id ? "bg-white text-black" : "bg-[#1A1D23] text-slate-400 border border-white/5"}`}>
                                                    {s.name}
                                                </button>
                                                <button onClick={() => deleteStock(s.id)} className="absolute -top-1 -right-1 w-5 h-5 bg-rose-500 text-white rounded-full text-[10px] hidden group-hover:flex items-center justify-center"><i className="fa-solid fa-x"></i></button>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 추가 입력창 */}
                                    {isAdding && (
                                        <div className="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl flex flex-wrap gap-3 animate-fade-in">
                                            <input type="text" placeholder="종목명(예: 네이버)" value={newStock.name} onChange={e=>setNewStock({...newStock, name: e.target.value})} className="bg-[#0F1115] border border-white/10 rounded-lg px-3 py-2 flex-1 text-sm outline-none focus:border-blue-500" />
                                            <input type="text" placeholder="종목번호(예: 035420)" value={newStock.id} onChange={e=>setNewStock({...newStock, id: e.target.value})} className="bg-[#0F1115] border border-white/10 rounded-lg px-3 py-2 w-32 text-sm outline-none focus:border-blue-500" />
                                            <select value={newStock.market} onChange={e=>setNewStock({...newStock, market: e.target.value})} className="bg-[#0F1115] border border-white/10 rounded-lg px-2 py-2 text-sm">
                                                <option value=".KS">코스피</option>
                                                <option value=".KQ">코스닥</option>
                                            </select>
                                            <button onClick={addStock} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">추가하기</button>
                                        </div>
                                    )}

                                    <div className="bg-[#1A1D23] rounded-2xl border border-white/5 p-6">
                                        <h3 className="text-4xl font-black tracking-tighter mb-8">
                                            {isLoading ? <span className="pulse-text text-slate-600">불러오는 중...</span> : formatKRW(currentPricesMap[selectedSymbol])}
                                        </h3>
                                        <div className="h-[300px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={prices[selectedSymbol]}>
                                                    <defs>
                                                        <linearGradient id="colorP" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor={stocks.find(s=>s.id===selectedSymbol)?.color} stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor={stocks.find(s=>s.id===selectedSymbol)?.color} stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="#ffffff05" vertical={false} />
                                                    <XAxis dataKey="time" hide />
                                                    <YAxis hide domain={['auto', 'auto']} />
                                                    <Tooltip contentStyle={{backgroundColor:'#1A1D23', border:'none', borderRadius:'12px'}} itemStyle={{fontWeight:'bold'}} />
                                                    <Area type="monotone" dataKey="price" stroke={stocks.find(s=>s.id===selectedSymbol)?.color} strokeWidth={3} fill="url(#colorP)" isAnimationActive={false} />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="bg-[#1A1D23] rounded-2xl border border-white/5 p-6 space-y-6">
                                        <div>
                                            <label className="text-xs font-black text-slate-500 mb-3 block uppercase">매매 수량</label>
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => setTradeQuantity(q => Math.max(1, q - 1))} className="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center"><i className="fa-solid fa-minus"></i></button>
                                                <input type="number" value={tradeQuantity} onChange={e=>setTradeQuantity(Math.max(1, parseInt(e.target.value)||1))} className="flex-1 bg-white/5 rounded-xl h-12 text-center text-xl font-black outline-none" />
                                                <button onClick={() => setTradeQuantity(q => q + 1)} className="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center"><i className="fa-solid fa-plus"></i></button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={()=>handleTrade('BUY')} className="h-16 rounded-2xl bg-emerald-500 text-black font-black text-xl shadow-lg shadow-emerald-500/20 active:scale-95">매수</button>
                                            <button onClick={()=>handleTrade('SELL')} className="h-16 rounded-2xl bg-rose-500 text-white font-black text-xl shadow-lg shadow-rose-500/20 active:scale-95">매도</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="animate-fade-in bg-[#1A1D23] rounded-2xl border border-white/5 overflow-hidden">
                                {history.length === 0 ? <p className="p-20 text-center text-slate-600 font-bold">거래 내역이 없습니다.</p> : (
                                    <div className="divide-y divide-white/5">
                                        {history.map(tx => (
                                            <div key={tx.id} className="p-5 flex justify-between items-center">
                                                <div>
                                                    <span className={`px-2 py-1 rounded text-[10px] font-black mr-2 ${tx.type === 'BUY' ? 'bg-emerald-500/20 text-emerald-400':'bg-rose-500/20 text-rose-400'}`}>{tx.type === '매수' ? '매수' : '매도'}</span>
                                                    <span className="font-black">{stocks.find(s=>s.id===tx.symbol)?.name || tx.symbol}</span>
                                                    <p className="text-[10px] text-slate-500 mt-1">{new Date(tx.timestamp).toLocaleString()}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black">{tx.quantity} 주</p>
                                                    <p className="text-xs text-slate-400 font-bold">{formatKRW(tx.price)}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1A1D23]/95 backdrop-blur-xl border-t border-white/5 px-6 py-4 z-50">
                        <div className="max-w-md mx-auto flex justify-between">
                            <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 w-1/3 ${activeTab === 'dashboard' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-border-all text-xl"></i><span className="text-[10px] font-black uppercase">대시보드</span></button>
                            <button onClick={()=>setActiveTab('trade')} className={`flex flex-col items-center gap-1 w-1/3 ${activeTab === 'trade' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-chart-simple text-xl"></i><span className="text-[10px] font-black uppercase">주식거래</span></button>
                            <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center gap-1 w-1/3 ${activeTab === 'history' ? 'text-blue-500':'text-slate-500'}`}><i className="fa-solid fa-clock-rotate-left text-xl"></i><span className="text-[10px] font-black uppercase">내역</span></button>
                        </div>
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
